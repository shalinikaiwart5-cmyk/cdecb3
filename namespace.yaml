
apiVersion: v1
kind: Pod 
metadata: 
  name: prodpod
  namespace: prod
  labels:   
    app: myapp 
spec: 
    containers:
        - name: nginx
          image: nginx:latest
          ports:
            - containerPort : 80
              protocol : TCP
              name: nginx
--- 
apiVersion: v1 
kind: Service
metadata:
    name: myservice
    namespace: prod
spec: 
    type: NodePort
    selector: 
      app: myapp
    ports: 
        - port: 80 
          targetPort: 80
          protocol: TCP 
    ---
    apiVersion: v1
kind:  Namespace
metadata:
    name: prod
    labels:
      app: prod
